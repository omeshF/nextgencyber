<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="100" height="100" rx="14" fill="#87CEEB"/>

  <!-- Sun with rays and smiling face -->
  <!-- Sun rays -->
  <g>
    <!-- Longer rays -->
    <line x1="78" y1="4" x2="78" y2="0" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="89" y1="8" x2="95" y2="3" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="93" y1="19" x2="100" y2="19" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="89" y1="30" x2="95" y2="35" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="78" y1="34" x2="78" y2="40" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
     
    <line x1="63" y1="19" x2="56" y2="19" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="67" y1="8" x2="61" y2="3" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <!-- Shorter rays between -->
    <line x1="71" y1="32" x2="65" y2="37" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"/>
     
  </g>
  <!-- Sun body -->
  <circle cx="78" cy="19" r="11" fill="#FFD54F"/>

  <!-- Smiling face on sun -->
  <!-- Eyes -->
  <circle cx="73" cy="16" r="1.2" fill="#2C3E50"/>
  <circle cx="83" cy="16" r="1.2" fill="#2C3E50"/>
  <!-- Smile -->
  <path d="M72 23 Q78 27 84 23" fill="none" stroke="#2C3E50" stroke-width="1" stroke-linecap="round"/>

  <!-- Clouds -->
  <ellipse cx="16" cy="26" rx="14" ry="9" fill="#fff" opacity="0.9"/>
  <ellipse cx="27" cy="23" rx="12" ry="8" fill="#fff" opacity="0.95"/>
  <ellipse cx="38" cy="26" rx="10" ry="7" fill="#fff" opacity="0.85"/>
  <ellipse cx="54" cy="31" rx="11" ry="7" fill="#fff" opacity="0.8"/>
  <ellipse cx="63" cy="28" rx="9" ry="6" fill="#fff" opacity="0.85"/>

  <!-- Grass -->
  <rect x="0" y="74" width="100" height="26" fill="#5D8A3C"/>
  <rect x="0" y="74" width="100" height="8" fill="#6FAA44"/>

  <!-- Tree: centered trunk -->
  <rect x="58.5" y="54" width="5" height="22" rx="2" fill="#4E342E"/>

  <!-- Tree foliage -->
  <ellipse cx="61" cy="51" rx="14" ry="11" fill="#2E7D32"/>
  <ellipse cx="61" cy="44" rx="11" ry="9" fill="#388E3C"/>
  <ellipse cx="61" cy="38" rx="8" ry="7" fill="#43A047"/>

  <!-- Park Bench - More appealing version -->
  <!-- Seat -->
  <rect x="7" y="65" width="40" height="5" rx="2.5" fill="#8D6E63"/>
  
  <!-- Backrest -->
  <rect x="9" y="55" width="3" height="12" rx="1" fill="#A1887F"/>
  <rect x="19" y="54" width="3" height="13" rx="1" fill="#A1887F"/>
  <rect x="29" y="55" width="3" height="12" rx="1" fill="#A1887F"/>
  <rect x="39" y="56" width="3" height="11" rx="1" fill="#A1887F"/>
  
  <!-- Backrest top rail -->
  <rect x="7" y="53" width="37" height="3" rx="1.5" fill="#A1887F"/>
  
  <!-- Legs -->
  <rect x="10" y="68" width="3.5" height="15" rx="1.5" fill="#6D4C41"/>
  <rect x="42" y="68" width="3.5" height="15" rx="1.5" fill="#6D4C41"/>
  <rect x="10" y="64" width="3" height="8" rx="1" fill="#6D4C41"/>
  <rect x="42" y="64" width="3" height="8" rx="1" fill="#6D4C41"/>
  
  <!-- Armrests -->
  <rect x="7" y="61" width="4" height="6" rx="1" fill="#A1887F"/>
  <rect x="41" y="61" width="4" height="6" rx="1" fill="#A1887F"/>
</svg>